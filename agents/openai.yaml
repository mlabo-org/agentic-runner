display_name: Agentic Runner
short_description: Agentic Runner is the upper control-plane above subordinate execution workflows: coding-agents, Agentic StructCiv, and CodexVideo.
default_prompt: Use agentic-runner as the upper control-plane above subordinate execution workflows. Route coding-agents for code/debug/source repair, Agentic StructCiv for article/BLOG/WordPress/SWELL, and CodexVideo for video/short/voice/narration. Agentic Runner owns routing, stateful handoff, supervision, resume decisions, and final cross-workflow audit. Mixed routes require --specialist-owner. Use orchestrate as control-plane route state only; keep source/cache/runtime refresh or activation as separate parent-approved boundaries.
